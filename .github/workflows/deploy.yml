name: Deploy a GitHub Pages

on:
  push:
    branches: [ master ] 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --configuration production --base-href /GolpeaAlTopo/ --output-path dist/golpea-al-topo

      - name: Debug Output (Opcional)
        run: ls -R dist/
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/golpea-al-topo/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4