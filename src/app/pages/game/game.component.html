<section class="game">
  <header class="game__header">
    <h2 class="game__title">Hola, {{ playerName }}</h2>
    <p class="game__score">Puntos: {{ score }}</p>
  </header>

  <section class="game__controls">
    <button class="game__button" (click)="startGame()">Play</button>

    <section class="game__difficulty">
      <button (click)="setDifficulty('low')" [class.is-active]="difficulty === 'low'">
        Bajo
      </button>

      <button (click)="setDifficulty('medium')" [class.is-active]="difficulty === 'medium'">
        Medio
      </button>

      <button (click)="setDifficulty('high')" [class.is-active]="difficulty === 'high'">
        Alto
      </button>
    </section>
  </section>

  <app-board
    [activeIndex]="activeIndex"
    (cellClicked)="onCellClicked($event)"
  />
</section>
